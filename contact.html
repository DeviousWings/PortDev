<body>
    <header>
        <nav class="navbar">
            <div class="nav-left"><img src="pics/space_rd.jpg" alt="Nathanael King logo"></div>

        </nav>
    </header>
    <form action="https://formspree.io/f/xqapnzee" method="POST" class="contact-form">
        <h1>Contact Me</h1>
        <p class="contact-intro">Have a project in mind or just want to say hello? I usually respond within 24 hours.</p>
        <label for="name">Your name:</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required />
        <label for="email">Your email:</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
        <label for="message">Your message:</label>
        <textarea id="message" name="message" rows="6" placeholder="Type your message here..." required></textarea>
        <button type="submit" class="cta-button">Send</button>
    </form>
